name: Publish NuGet

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Version suffix (e.g. beta.1). Leave blank for a stable build."
        required: false
        default: ""
      push_public:
        description: "Push to nuget.org as well?"
        required: false
        default: "false"

jobs:
  publish:
    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC): exchange a short-lived GitHub token for a NuGet
    # API key — no long-lived NUGET_API_KEY secret. Requires id-token: write.
    permissions:
      id-token: write
      contents: read

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET setup ──────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Resolve version suffix ───────────────────────────────────────────────
      - name: Resolve version suffix
        id: versioning
        run: |
          TAG="${{ github.ref }}"
          if [[ "$TAG" == refs/tags/v* ]]; then
            TAG_VERSION="${TAG#refs/tags/v}"
          
            if [[ "$TAG_VERSION" == *-* ]]; then
              echo "suffix=${TAG_VERSION#*-}" >> "$GITHUB_OUTPUT"
            else
              echo "suffix=" >> "$GITHUB_OUTPUT"
            fi
          elif [[ -n "${{ github.event.inputs.version_suffix }}" ]]; then
            echo "suffix=${{ github.event.inputs.version_suffix }}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=preview.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Restore ─────────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore AVR8Sharp.sln

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build AVR8Sharp.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Test
        run: >
          dotnet test tests/Avr8Sharp.Tests/Avr8Sharp.Tests.csproj
          -c Release
          --no-build
          --logger "console;verbosity=normal"

      # ── Rolling BUSL Change Date: stamp each packed license file with
      #    (release date + 4 years) so every published version gets a full
      #    4-year BUSL window before it converts to the Change License (MIT). ──
      - name: Stamp BUSL Change Date (release + 4 years)
        run: |
          CHANGE_DATE=$(date -u -d "+4 years" +%Y-%m-%d)
          stamped=0
          for f in LICENSE-BUSL.txt LICENSE; do
            if [ -f "$f" ] && grep -qE '^Change Date:' "$f"; then
              sed -i -E "s|^(Change Date: +).*|\1$CHANGE_DATE|" "$f"
              echo "$f -> Change Date $CHANGE_DATE"
              stamped=1
            fi
          done
          [ "$stamped" = 1 ] || { echo "::error::no BUSL license file with a Change Date found"; exit 1; }

      # ── Pack ─────────────────────────────────────────────────────────────────
      - name: Pack Avr8Sharp
        run: >
          dotnet pack src/Avr8Sharp/Avr8Sharp.csproj
          -c Release
          --no-build
          --output ./nupkgs
          ${{ steps.versioning.outputs.full_version != '' && format('/p:Version={0}', steps.versioning.outputs.full_version) || (steps.versioning.outputs.suffix != '' && format('--version-suffix {0}', steps.versioning.outputs.suffix) || '') }}
      - name: Pack Avr8Sharp.TestKit.Core
        run: >
          dotnet pack src/Avr8Sharp.TestKit.Core/Avr8Sharp.TestKit.Core.csproj
          -c Release
          --no-build
          --output ./nupkgs
          ${{ steps.versioning.outputs.full_version != '' && format('/p:Version={0}', steps.versioning.outputs.full_version) || (steps.versioning.outputs.suffix != '' && format('--version-suffix {0}', steps.versioning.outputs.suffix) || '') }}
      - name: Pack Avr8Sharp.TestKit
        run: >
          dotnet pack src/Avr8Sharp.TestKit/Avr8Sharp.TestKit.csproj
          -c Release
          --no-build
          --output ./nupkgs
          ${{ steps.versioning.outputs.full_version != '' && format('/p:Version={0}', steps.versioning.outputs.full_version) || (steps.versioning.outputs.suffix != '' && format('--version-suffix {0}', steps.versioning.outputs.suffix) || '') }}

      # ── NuGet Trusted Publishing login (OIDC) ────────────────────────────────
      # Exchanges the workflow's OIDC token for a short-lived nuget.org API key.
      # The trusted-publishing policy (owner + repo + workflow) must exist on
      # nuget.org, and the account username is provided via the NUGET_USER var.
      - name: NuGet login (Trusted Publishing)
        id: nuget_login
        if: >
          ${{ github.server_url == 'https://github.com' &&
              (startsWith(github.ref, 'refs/tags/v') ||
              github.event.inputs.push_public == 'true') }}
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      # ── Push to nuget.org ────────────────────────────────────────────────────
      - name: Push to nuget.org
        if: >
          ${{ github.server_url == 'https://github.com' &&
              (startsWith(github.ref, 'refs/tags/v') ||
              github.event.inputs.push_public == 'true') }}
        run: >
          dotnet nuget push "./nupkgs/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"
          --skip-duplicate

      - name: Upload NuGet Packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ steps.versioning.outputs.full_version || steps.versioning.outputs.suffix }}
          path: ./nupkgs/*.nupkg
          retention-days: 14
          if-no-files-found: error
