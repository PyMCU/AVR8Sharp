name: Build and Test

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on every push and pull-request to any branch.
# Compatible with GitHub Actions and Gitea Act Runner.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET setup ───────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Restore ───────────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore AVR8Sharp.sln

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build AVR8Sharp.sln -c Release --no-restore

      # ── Test ──────────────────────────────────────────────────────────────────
      - name: Test
        run: >
          dotnet test tests/Avr8Sharp.Tests/Avr8Sharp.Tests.csproj
          -c Release
          --no-build
          --logger "console;verbosity=normal"
