name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on every push and pull-request to any branch.
# Compatible with GitHub Actions and Gitea Act Runner.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET setup ───────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Private NuGet source (optional) ──────────────────────────────────────
      # Set NUGET_PRIVATE_SOURCE_URL and NUGET_PRIVATE_API_KEY in repository
      # secrets to restore packages from your own NuGet server.
      - name: Add private NuGet source
        if: ${{ secrets.NUGET_PRIVATE_SOURCE_URL != '' }}
        run: |
          dotnet nuget add source "${{ secrets.NUGET_PRIVATE_SOURCE_URL }}" \
            --name private \
            --username ci \
            --password "${{ secrets.NUGET_PRIVATE_API_KEY }}" \
            --store-password-in-clear-text

      # ── Restore ───────────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore AVR8Sharp.sln

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build AVR8Sharp.sln -c Release --no-restore

      # ── Test ──────────────────────────────────────────────────────────────────
      - name: Test
        run: >
          dotnet test tests/Avr8Sharp.Tests/Avr8Sharp.Tests.csproj
          -c Release
          --no-build
          --logger "console;verbosity=normal"
